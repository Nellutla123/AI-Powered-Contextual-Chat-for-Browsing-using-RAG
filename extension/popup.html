<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome RAG Plugin</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>RAG Assistant</h1>
      <div class="status-badge" id="backend-status">Checking backend...</div>
    </header>
    
    <main>
      <div id="chat-container">
        <div class="message assistant">
          Hello! I can help you understand this page. Click "Index Page" below to get started.
        </div>
      </div>
    </main>
    
    <footer>
      <div class="action-bar">
        <button id="index-btn" class="secondary-btn">Index Page</button>
      </div>
      <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
        <button id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
